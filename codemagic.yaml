workflows:
  ios-testflight:
    name: iOS · TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: haloframe_asc

    environment:
      groups:
        # Bundles APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_ISSUER_ID,
        # APP_STORE_CONNECT_PRIVATE_KEY, APPLE_TEAM_ID. See .codemagic/secrets.md.
        - haloframe_secrets
      vars:
        BUNDLE_ID: com.haloframe.app
        # Capacitor 8 uses Swift Package Manager, not CocoaPods, so we point at
        # the .xcodeproj directly (there's no top-level .xcworkspace).
        XCODE_PROJECT: apps/web/ios/App/App.xcodeproj
        XCODE_SCHEME: App
      # Capacitor 8 CLI requires NodeJS >=22; pinning to 22 keeps the
      # ios-testflight workflow building on the supported runtime.
      node: 22
      xcode: latest

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Install root deps
        script: |
          # npm workspaces — same install path Vercel uses (vercel.json
          # `installCommand: npm ci --no-audit --no-fund`).
          npm ci --no-audit --no-fund

      - name: Build web bundle
        script: |
          # @haloframe/web depends on the shared package's compiled output;
          # build shared first to mirror the Vercel build chain.
          npm run build --workspace=@haloframe/shared
          npm run build --workspace=@haloframe/web

      - name: Capacitor sync (iOS)
        script: |
          # `npx cap` from inside apps/web fails on npm 10 + workspaces:
          # @capacitor/cli is hoisted to <root>/node_modules/.bin/cap, but npx
          # doesn't reliably walk up across workspace boundaries and falls back
          # to a registry lookup ("could not determine executable to run").
          # `npm run --workspace` uses npm's own resolver, which traverses the
          # workspace .bin chain correctly (same mechanism that makes Step 3's
          # `tsc -b && vite build` work).
          npm run sync:ios --workspace=@haloframe/web

      - name: Set Xcode build + marketing version
        script: |
          cd apps/web/ios/App
          # Build number = Codemagic's monotonic per-project counter.
          agvtool new-version -all "$BUILD_NUMBER"
          # Marketing version = the tag, stripped of the leading `v` and any
          # `-rc.N` suffix (so v1.0.0-rc1 → 1.0.0). This is what shows in the
          # App Store; rc-cycle metadata stays in the build number.
          MARKETING="$(echo "$CM_TAG" | sed 's/^v//' | sed 's/-rc.*//')"
          agvtool new-marketing-version "$MARKETING"

      - name: Initialize keychain (App Store Connect)
        script: keychain initialize

      - name: Fetch + create signing files
        script: |
          # Codemagic's --create requires a private key to generate the CSR
          # Apple signs into a distribution cert. The CLI does NOT auto-
          # generate one in non-interactive mode (build fails with
          # "Cannot save Signing Certificates without certificate private
          # key"). We persist a single key in the haloframe_secrets group
          # so Apple keeps issuing the same cert across builds (vs. burning
          # through Apple's 2-cert-per-team quota).
          # Key was provisioned via scripts/codemagic-add-signing-key.mjs.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create

      - name: Add certs to keychain
        script: keychain add-certificates

      - name: Apply provisioning profiles
        script: xcode-project use-profiles

      - name: Build .ipa
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - external testers

  android-internal:
    name: Android · Play Internal Testing
    # mac_mini_m2 (same as iOS) — linux_x2 is not on the current Codemagic
    # billing plan ("instance type not available"). Android builds fine on
    # the macOS image (Gradle + Android SDK preinstalled).
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      groups:
        # Bundles the four CM_KEYSTORE_* signing vars (CM_KEY_ALIAS,
        # CM_KEYSTORE_PASSWORD, CM_KEY_PASSWORD, CM_KEYSTORE_BASE64) plus
        # an optional GCLOUD_SERVICE_ACCOUNT_CREDENTIALS for the Play
        # publish step. Group is shared with the iOS workflow.
        - haloframe_secrets
      vars:
        PACKAGE_NAME: com.haloframe.app
      # Same Capacitor 8 NodeJS pin as the iOS workflow.
      node: 22
      # Capacitor 8's capacitor-android module compiles at Java 21 source
      # level — JDK 17 fails with "invalid source release: 21".
      java: 21

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Install root deps
        script: |
          npm ci --no-audit --no-fund

      - name: Build web bundle
        script: |
          npm run build --workspace=@haloframe/shared
          npm run build --workspace=@haloframe/web

      - name: Capacitor sync (Android)
        script: |
          # Same workspace-resolver fix as the iOS Capacitor sync step —
          # see ios-testflight for why `npx cap` from inside apps/web
          # fails on npm 10 + workspaces.
          npm run sync:android --workspace=@haloframe/web

      - name: Decode upload keystore
        script: |
          # CM_KEYSTORE_BASE64 holds the entire .keystore file (base64).
          # Land it in a deterministic path and expose CM_KEYSTORE_PATH for
          # apps/web/android/app/build.gradle's signingConfigs block.
          echo "$CM_KEYSTORE_BASE64" | base64 --decode > /tmp/upload.keystore
          echo 'CM_KEYSTORE_PATH=/tmp/upload.keystore' >> $CM_ENV

      - name: Set Android version
        script: |
          # versionCode = Codemagic's monotonic counter (same value the iOS
          # workflow feeds into agvtool).
          echo "VERSION_CODE=$BUILD_NUMBER" >> $CM_ENV
          # versionName = tag stripped of leading `v` and `-rc.N` suffix.
          # Falls back to 1.0.0 when built from a branch (no CM_TAG).
          MARKETING="$(echo "${CM_TAG:-v1.0.0}" | sed 's/^v//' | sed 's/-rc.*//')"
          echo "VERSION_NAME=$MARKETING" >> $CM_ENV

      - name: Build .aab
        script: |
          cd apps/web/android
          chmod +x ./gradlew
          ./gradlew bundleRelease

    artifacts:
      - apps/web/android/app/build/outputs/bundle/release/*.aab
      - apps/web/android/app/build/outputs/mapping/**/mapping.txt

    # Auto-publish to Play is intentionally commented until Task 24 (Play
    # service-account JSON in Codemagic's haloframe_secrets group as
    # GCLOUD_SERVICE_ACCOUNT_CREDENTIALS) lands. With the block enabled
    # but the env var missing, Codemagic fails the build at the publish
    # step. Until then, download the .aab artifact from Codemagic and
    # upload it to Play Console → Internal Testing manually.
    #
    # publishing:
    #   google_play:
    #     credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
    #     track: internal
    #     in_app_update_priority: 0

  ios-sim-diagnostic:
    name: iOS · Simulator upload diagnostic
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      groups:
        # Provides VITE_SUPABASE_URL/ANON_KEY + VITE_API_URL so the diagnostic
        # exercises the SAME baked config a real TestFlight build gets — if the
        # anon key or API URL is malformed in Codemagic, this surfaces it too.
        - haloframe_secrets
      vars:
        VITE_E2E_DIAG: "1"
        BUNDLE_ID: com.haloframe.app
      node: 22
      xcode: latest
    # No `triggering:` — API/manual only (node scripts/codemagic-probe.mjs
    # trigger <branch> ios-sim-diagnostic). Never auto-builds, never signs,
    # never touches TestFlight.
    scripts:
      - name: Install root deps
        script: npm ci --no-audit --no-fund
      - name: Build web bundle (E2E diagnostic mode)
        script: |
          npm run build --workspace=@haloframe/shared
          npm run build --workspace=@haloframe/web
      - name: Capacitor sync (iOS)
        script: npm run sync:ios --workspace=@haloframe/web
      - name: Boot simulator
        script: |
          set -e
          echo "=== available devices ==="
          xcrun simctl list devices available | head -50
          # Prefer a PRE-CREATED iPhone under the newest iOS runtime (guaranteed
          # compatible). Only create one if none exist — and then from the
          # runtime's OWN supportedDeviceTypes so it can't be an incompatible
          # pairing (the iPhone-6s-Plus + iOS 26 "Incompatible device" failure).
          UDID=$(xcrun simctl list devices available -j | python3 -c "import sys,json,re; d=json.load(sys.stdin)['devices']; ios=sorted([k for k in d if 'iOS' in k], key=lambda s:[int(n) for n in re.findall(r'\d+',s)]); devs=d[ios[-1]] if ios else []; iph=[x for x in devs if 'iPhone' in x['name']]; print((iph[-1] if iph else (devs[0] if devs else {'udid':''}))['udid'])")
          if [ -z "$UDID" ]; then
            echo "no pre-created sim; creating one from the runtime's supported device types"
            SEL=$(xcrun simctl list runtimes available -j | python3 -c "import sys,json,re; rts=[x for x in json.load(sys.stdin)['runtimes'] if x.get('isAvailable') and 'iOS' in x['name']]; rt=sorted(rts,key=lambda x:[int(n) for n in x['version'].split('.')])[-1]; ips=[t for t in rt.get('supportedDeviceTypes',[]) if 'iPhone' in t.get('name','')]; sc=lambda t:(int(re.search(r'iPhone (\\d+)',t['name']).group(1)) if re.search(r'iPhone (\\d+)',t['name']) else 0); dev=sorted(ips,key=sc)[-1]; print(rt['identifier']+'|'+dev['identifier'])")
            UDID=$(xcrun simctl create "e2e-iphone" "${SEL##*|}" "${SEL%%|*}")
          fi
          echo "chosen UDID=$UDID"
          echo "UDID=$UDID" | tee -a $CM_ENV
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
      - name: Build app for simulator (no signing)
        script: |
          set -eo pipefail
          cd apps/web/ios/App
          xcodebuild -project App.xcodeproj -scheme App -configuration Debug \
            -sdk iphonesimulator -destination "id=$UDID" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO COMPILER_INDEX_STORE_ENABLE=NO \
            build 2>&1 | tail -50
      - name: Launch + run diagnostic + capture
        script: |
          set +e
          APP=$(find apps/web/ios/App/build/Build/Products -name "App.app" -type d | head -1)
          echo "APP=$APP"
          xcrun simctl install "$UDID" "$APP"
          xcrun simctl spawn "$UDID" log stream --level debug --style compact \
            --predicate 'eventMessage CONTAINS "E2E_DIAG"' > sim-e2e-log.txt 2>&1 &
          LOGPID=$!
          xcrun simctl launch "$UDID" "$BUNDLE_ID"
          echo "launched; waiting 80s for the diagnostic to run..."
          sleep 80
          xcrun simctl io "$UDID" screenshot e2e-diag.png || true
          kill $LOGPID 2>/dev/null
          CONTAINER=$(xcrun simctl get_app_container "$UDID" "$BUNDLE_ID" data 2>/dev/null)
          echo "container=$CONTAINER"
          echo "========== e2e-result.txt =========="
          cat "$CONTAINER/Documents/e2e-result.txt" 2>/dev/null || echo "(no result file written)"
          echo ""
          echo "========== E2E_DIAG console log =========="
          head -120 sim-e2e-log.txt 2>/dev/null || echo "(no console log)"
          echo "========== end =========="
    artifacts:
      - e2e-diag.png
      - sim-e2e-log.txt
